<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
</head>
<body>
    <h1>회원가입</h1>
    <form action="/signup_data" method="POST">
        <div class="form-group">
            <label for="userid">아이디</label>
            <input type="text" class="form-control" id="userid" placeholder="아이디" name="userid"/>
                <!-- id는 삭제해도 되더라. 마지막에 name과 app.py의 get 메소드 사용하는 부분이 일치해야 상응한다 -->
        </div>
        <div class="form-group">
            <label for="username">사용자 이름</label>
            <input type="text" class="form-control" id="username" placeholder="사용자 이름" name="username"/>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" class="form-control" id="password" placeholder="비밀번호" name="password"/>
        </div>
        <div class="form-group">
            <label for="re_password">비밀번호확인</label>
            <input type="password" class="form-control" id="re_password" placeholder="비밀번호확인" name="re_password"/>
        </div>
        <div class="form-group">
            <label for="re_password">학번</label>
            <input type="password" class="form-control" id="re_password" placeholder="학번" name="re_password"/>
        </div>
        <div class="form-group">
            <label for="re_password">학과</label>
            <input type="password" class="form-control" id="re_password" placeholder="학과" name="re_password"/>
        </div>
        <div class="form-group">
            <label for="re_password">MBTI(선택)</label>
            <input type="password" class="form-control" id="re_password" placeholder="MBTI(선택)" name="re_password"/>
            <h4>MBTI에 대해 모르는 경우 "모름" 기입</h4>
            <a href="https://www.16personalities.com/ko/%EB%AC%B4%EB%A3%8C-%EC%84%B1%EA%B2%A9-%EC%9C%A0%ED%98%95-%EA%B2%80%EC%82%AC">MBTI 테스트 사이트로 이동</a>
        </div>
        <button type="submit" class="btn btn-primary">등록</button>
    </form>
</body>
</html>
